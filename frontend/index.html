<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>

  <!-- Video.js -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <span class="site-title">Stream</span>
    <span id="status-badge" class="badge offline">Offline</span>
  </header>

  <main>
    <section class="player-section">
      <video
        id="player"
        class="video-js vjs-default-skin vjs-big-play-centered"
        controls
        preload="auto"
        playsinline
      ></video>
      <p id="offline-msg" class="offline-msg">Stream is currently offline.</p>
    </section>

    <aside class="chat-section">
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form" autocomplete="off">
        <input id="chat-username" class="chat-input" type="text" placeholder="Username" maxlength="32" />
        <div class="chat-row">
          <input id="chat-message" class="chat-input flex-1" type="text" placeholder="Say something..." maxlength="500" />
          <button type="submit">Send</button>
        </div>
      </form>
    </aside>
  </main>

  <script>
    // Injected by nginx sub_filter at serve time
    window.STREAM_DOMAIN = '%%DOMAIN%%';
  </script>
  <script src="app.js"></script>
</body>
</html>
